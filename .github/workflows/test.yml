name: Tests

on:
  push:
    branches: [main]
    paths:
      - 'frontend/**'
      - '.github/workflows/test.yml'
  pull_request:
    paths:
      - 'frontend/**'
      - '.github/workflows/test.yml'
  workflow_dispatch:

defaults:
  run:
    working-directory: frontend

jobs:
  unit:
    name: Unit + component (Vitest)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npm run test

  e2e:
    name: E2E (Playwright)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    # Build-time public env. Defaults keep the build working even without
    # secrets; the default E2E specs don't require a live database. The
    # opt-in write lifecycle (E2E_WRITE) is intentionally NOT enabled here.
    env:
      NEXT_PUBLIC_SPACETIMEDB_HOST: ${{ secrets.NEXT_PUBLIC_SPACETIMEDB_HOST || 'wss://example.invalid' }}
      NEXT_PUBLIC_SPACETIMEDB_DB: ${{ secrets.NEXT_PUBLIC_SPACETIMEDB_DB || 'whathaveiwatched' }}
      TMDB_READ_ACCESS_TOKEN: ${{ secrets.TMDB_READ_ACCESS_TOKEN || 'test-token' }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium
      - name: Run E2E (builds + serves prod on :3100)
        run: npm run test:e2e
      - uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: playwright-report
          path: frontend/playwright-report
          retention-days: 7
