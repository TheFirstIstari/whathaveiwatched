name: Deploy frontend

on:
  push:
    branches: [main]
    paths:
      - 'frontend/**'
      - '.github/workflows/deploy-frontend.yml'
  workflow_dispatch:

concurrency:
  group: deploy-frontend
  cancel-in-progress: true

jobs:
  deploy:
    name: Deploy to home server
    runs-on: ubuntu-latest
    timeout-minutes: 15

    env:
      DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
      DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
      DEPLOY_PORT: ${{ secrets.DEPLOY_PORT || '22' }}
      DEPLOY_PATH: ${{ secrets.DEPLOY_PATH || '/opt/whathaveiwatched' }}
      PM2_PROCESS: ${{ secrets.PM2_PROCESS || 'whathaveiwatched' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Join tailnet
        uses: tailscale/github-action@v3
        with:
          authkey: ${{ secrets.TAILSCALE_AUTHKEY }}

      - name: Install rsync
        run: sudo apt-get update && sudo apt-get install -y rsync

      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "${{ secrets.DEPLOY_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -p "$DEPLOY_PORT" "$DEPLOY_HOST" >> ~/.ssh/known_hosts

      - name: Sync frontend
        run: |
          rsync -az --delete \
            --exclude node_modules \
            --exclude .next \
            --exclude .env.local \
            -e "ssh -i ~/.ssh/deploy_key -p $DEPLOY_PORT" \
            frontend/ "$DEPLOY_USER@$DEPLOY_HOST:$DEPLOY_PATH/"

      - name: Install, build, restart
        run: |
          ssh -i ~/.ssh/deploy_key -p "$DEPLOY_PORT" "$DEPLOY_USER@$DEPLOY_HOST" \
            "cd '$DEPLOY_PATH' && npm ci && npm run build && pm2 restart '$PM2_PROCESS'"

      - name: Smoke test local app
        run: |
          ssh -i ~/.ssh/deploy_key -p "$DEPLOY_PORT" "$DEPLOY_USER@$DEPLOY_HOST" \
            "curl --fail --silent --show-error --max-time 10 http://127.0.0.1:3001/ >/dev/null"
